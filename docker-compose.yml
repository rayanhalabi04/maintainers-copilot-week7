services:
  model_server:
    build:
      context: ./backend/model_server
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      PYTHONPATH: /app
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      MEMORY_STORE_DIR: /data/memory
      MODEL_SERVER_URL: http://model_server:8001
      WIDGET_APP_URL: http://localhost:5173
      DATABASE_URL: ${DATABASE_URL:-postgresql://maintainers:maintainers@db:5432/maintainers_copilot}
      RAG_FORCE_LOCAL_STORE: ${RAG_FORCE_LOCAL_STORE:-false}
      RAG_LOCAL_STORE_PATH: /data/rag_store.json
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
    volumes:
      - ./data:/data
      - ./backend/model_server/artifacts:/app/artifacts:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  streamlit:
    build:
      context: ./frontend/streamlit_app
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    environment:
      MODEL_SERVER_URL: http://model_server:8001
    depends_on:
      - model_server

  widget:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/widget:/app
      - widget_node_modules:/app/node_modules
    environment:
      VITE_MODEL_SERVER_URL: http://localhost:8001

  host:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./demo/host:/usr/share/nginx/html:ro
    depends_on:
      - model_server
      - widget

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maintainers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maintainers}
      POSTGRES_DB: ${POSTGRES_DB:-maintainers_copilot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

  vault:
    image: hashicorp/vault:1.17
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: server -dev

  migrate:
    image: python:3.12-slim
    working_dir: /workspace
    command: >
      sh -c "pip install --no-cache-dir alembic sqlalchemy 'psycopg[binary]' &&
             alembic upgrade head"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://maintainers:maintainers@db:5432/maintainers_copilot}
    volumes:
      - .:/workspace
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  widget_node_modules: